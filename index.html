<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ember Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Caveat:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #f5efe6;
      --surface:   #fdf8f2;
      --card:      #fffcf8;
      --border:    #e8ddd0;
      --ink:       #3a2e24;
      --ink-muted: #9c8878;
      --ink-light: #c4b5a5;
      --amber:     #d4873a;
      --amber-soft:#f0c98a;
      --amber-pale:#faecd8;
      --red-soft:  #e8998a;
      --green-soft:#8ab89a;
      --blue-soft: #8aaec8;
      --shadow:    rgba(58,46,36,0.10);
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(212,135,58,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(212,135,58,0.05) 0%, transparent 55%);
    }

    /* ── Tab radio trick ── */
    input[name="tab"] { display: none; }

    #tab-all:checked ~ .shell .tab-btn[for="tab-all"],
    #tab-fav:checked ~ .shell .tab-btn[for="tab-fav"],
    #tab-add:checked ~ .shell .tab-btn[for="tab-add"] {
      background: var(--amber);
      color: #fff;
      box-shadow: 0 2px 8px rgba(212,135,58,0.35);
    }

    #tab-all:checked ~ .shell .pane-all { display: block; }
    #tab-fav:checked ~ .shell .pane-fav { display: block; }
    #tab-add:checked ~ .shell .pane-add { display: block; }

    .pane-all,
    .pane-fav,
    .pane-add { display: none; }

    /* ── Shell ── */
    .shell {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 20px 100px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--amber), #c06b20);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(212,135,58,0.3);
    }

    .header-text h1 {
      font-family: 'Lora', serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .header-text p {
      font-size: 13px;
      color: var(--ink-muted);
      margin-top: 3px;
      font-weight: 300;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .tab-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      padding: 8px 20px;
      border-radius: 100px;
      background: var(--card);
      border: 1.5px solid var(--border);
      color: var(--ink-muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s, transform 0.1s;
      user-select: none;
    }

    .tab-btn:hover {
      background: var(--amber-pale);
      color: var(--amber);
      border-color: var(--amber-soft);
      transform: translateY(-1px);
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--ink-light);
      margin-bottom: 14px;
    }

    /* ── Grid ── */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    /* ── Note card ── */
    .note {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 20px 20px 16px;
      box-shadow: 0 2px 10px var(--shadow);
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      animation: fadein 0.35s ease both;
    }

    .note::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 18px 18px 0 0;
      background: var(--note-accent, var(--amber-soft));
    }

    .note:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(58,46,36,0.13);
    }

    .note.amber  { --note-accent: var(--amber); }
    .note.red    { --note-accent: var(--red-soft);   background: #fff9f8; }
    .note.green  { --note-accent: var(--green-soft); background: #f8fdf9; }
    .note.blue   { --note-accent: var(--blue-soft);  background: #f7fafd; }
    .note.wide   { grid-column: span 2; }

    @media (max-width: 520px) {
      .note.wide { grid-column: span 1; }
    }

    .note-tag {
      display: inline-block;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--ink-light);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      margin-bottom: 10px;
    }

    .note h3 {
      font-family: 'Lora', serif;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .note p {
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--ink-muted);
      font-weight: 300;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .note-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .note-date { font-size: 11px; color: var(--ink-light); }

    .note-actions { display: flex; gap: 6px; }

    .note-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .note-btn:hover {
      background: var(--amber-pale);
      transform: scale(1.1);
    }

    .handwritten {
      font-family: 'Caveat', cursive;
      font-size: 15px;
      color: var(--amber);
      margin-bottom: 4px;
      display: block;
    }

    .sticker {
      position: absolute;
      bottom: 14px;
      right: 16px;
      font-size: 20px;
      opacity: 0.55;
      transform: rotate(10deg);
    }

    .notes-grid .note:nth-child(1) { animation-delay: 0.05s; }
    .notes-grid .note:nth-child(2) { animation-delay: 0.10s; }
    .notes-grid .note:nth-child(3) { animation-delay: 0.15s; }
    .notes-grid .note:nth-child(4) { animation-delay: 0.20s; }
    .notes-grid .note:nth-child(5) { animation-delay: 0.25s; }
    .notes-grid .note:nth-child(6) { animation-delay: 0.30s; }

    /* ════════════════════════════════
       ADD NOTE PANE
    ════════════════════════════════ */
    .pane-add {
      animation: fadein 0.3s ease both;
    }

    .add-form {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 32px 32px 28px;
      box-shadow: 0 4px 20px var(--shadow);
      max-width: 580px;
    }

    .add-form-title {
      font-family: 'Lora', serif;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--ink);
    }

    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 11.5px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--ink-light);
      margin-bottom: 8px;
    }

    .field input,
    .field textarea {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--ink);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: none;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: var(--ink-light);
      font-weight: 300;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(212,135,58,0.12);
      background: var(--card);
    }

    .field textarea {
      min-height: 160px;
      line-height: 1.7;
    }

    /* icon picker */
    .icon-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .icon-option input[type="radio"] { display: none; }

    .icon-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      font-size: 20px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
      color: unset;
    }

    .icon-option input[type="radio"]:checked + label {
      border-color: var(--amber);
      background: var(--amber-pale);
      box-shadow: 0 0 0 3px rgba(212,135,58,0.15);
      transform: scale(1.1);
    }

    .icon-option label:hover {
      border-color: var(--amber-soft);
      background: var(--amber-pale);
    }

    /* color picker */
    .color-row { display: flex; gap: 10px; }

    .color-option input[type="radio"] { display: none; }

    .color-option label {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      display: block;
    }

    .color-option label:hover { transform: scale(1.15); }

    .color-option input[type="radio"]:checked + label {
      border-color: var(--ink);
      transform: scale(1.15);
    }

    .color-plain label { background: var(--border); }
    .color-amber label { background: var(--amber); }
    .color-red   label { background: var(--red-soft); }
    .color-green label { background: var(--green-soft); }
    .color-blue  label { background: var(--blue-soft); }

    /* form footer */
    .form-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .btn-save {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 11px 28px;
      border-radius: 100px;
      background: linear-gradient(135deg, var(--amber), #c06b20);
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(212,135,58,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212,135,58,0.45);
    }

    .btn-cancel {
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 400;
      color: var(--ink-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 11px 12px;
      border-radius: 100px;
      transition: color 0.15s;
    }

    .btn-cancel:hover { color: var(--ink); }

    /* ── Floating Add button ── */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 100;
    }

    .fab label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 13px 24px;
      border-radius: 100px;
      background: linear-gradient(135deg, var(--amber), #c06b20);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(212,135,58,0.4);
      transition: transform 0.18s, box-shadow 0.18s;
      user-select: none;
    }

    .fab label:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 28px rgba(212,135,58,0.5);
    }

    .fab label:active { transform: scale(0.97); }

    /* ── Animation ── */
    @keyframes fadein {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-light);
    }
    .empty-state .emoji {
      font-size: 40px;
      display: block;
      margin-bottom: 12px;
      opacity: 0.5;
    }
    .empty-state p { font-size: 14px; font-weight: 300; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<input type="radio" name="tab" id="tab-all" checked />
<input type="radio" name="tab" id="tab-fav" />
<input type="radio" name="tab" id="tab-add" />

<div class="shell">

  <!-- Header -->
  <header class="header">
    <div class="logo-mark">🕯️</div>
    <div class="header-text">
      <h1>Ember Notes</h1>
      <p>Your cozy little corner to think.</p>
    </div>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <label class="tab-btn" for="tab-all">✦ All Notes</label>
    <label class="tab-btn" for="tab-fav">♡ Favorites</label>
    <label class="tab-btn" for="tab-add">＋ Add Note</label>
  </div>

  <!-- ══════════ ALL NOTES ══════════ -->
  <div class="pane-all">
    <p class="section-label" id="all-label">All Notes</p>
    <div class="notes-grid" id="grid-all"></div>
    <div class="empty-state" id="empty-all" style="display:none;">
      <span class="emoji">🕯️</span>
      <p>No notes yet. Hit <strong>＋ Add Note</strong> to start.</p>
    </div>
  </div>

  <!-- ══════════ FAVORITES ══════════ -->
  <div class="pane-fav">
    <p class="section-label" id="fav-label">Favorites</p>
    <div class="notes-grid" id="grid-fav"></div>
    <div class="empty-state" id="empty-fav" style="display:none;">
      <span class="emoji">♡</span>
      <p>No favorites yet. Tap ♡ on any note to save it here.</p>
    </div>
  </div>

  <!-- ══════════ ADD NOTE ══════════ -->
  <div class="pane-add">
    <div class="add-form">
      <p class="add-form-title">✎ New Note</p>

      <div class="field">
        <label>Title</label>
        <input type="text" id="input-title" placeholder="Give your note a name…" />
      </div>

      <div class="field">
        <label>Pick an Icon</label>
        <div class="icon-row">
          <span class="icon-option"><input type="radio" name="icon" id="ic1" checked /><label for="ic1">📝</label></span>
          <span class="icon-option"><input type="radio" name="icon" id="ic2" /><label for="ic2">💡</label></span>
          <span class="icon-option"><input type="radio" name="icon" id="ic3" /><label for="ic3">📖</label></span>
          <span class="icon-option"><input type="radio" name="icon" id="ic4" /><label for="ic4">🌿</label></span>
          <span class="icon-option"><input type="radio" name="icon" id="ic5" /><label for="ic5">☕</label></span>
          <span class="icon-option"><input type="radio" name="icon" id="ic6" /><label for="ic6">⚡</label></span>
          <span class="icon-option"><input type="radio" name="icon" id="ic7" /><label for="ic7">🌙</label></span>
          <span class="icon-option"><input type="radio" name="icon" id="ic8" /><label for="ic8">🎯</label></span>
        </div>
      </div>

      <div class="field">
        <label>Card Color</label>
        <div class="color-row">
          <span class="color-option color-plain"><input type="radio" name="color" id="cl0" checked /><label for="cl0"></label></span>
          <span class="color-option color-amber"><input type="radio" name="color" id="cl1" /><label for="cl1"></label></span>
          <span class="color-option color-red"  ><input type="radio" name="color" id="cl2" /><label for="cl2"></label></span>
          <span class="color-option color-green" ><input type="radio" name="color" id="cl3" /><label for="cl3"></label></span>
          <span class="color-option color-blue"  ><input type="radio" name="color" id="cl4" /><label for="cl4"></label></span>
        </div>
      </div>

      <div class="field">
        <label>Content</label>
        <textarea id="input-content" placeholder="Write anything… thoughts, lists, quotes, ideas ✦"></textarea>
      </div>

      <div class="form-footer">
        <label class="btn-cancel" for="tab-all">Cancel</label>
        <button class="btn-save" id="btn-save">Save Note ✦</button>
      </div>
    </div>
  </div>

</div>

<!-- Floating Add Button -->
<div class="fab">
  <label for="tab-add">＋ Add Note</label>
</div>

<script>
  const COLOR_MAP = { cl0: '', cl1: 'amber', cl2: 'red', cl3: 'green', cl4: 'blue' };

  const SEEDS = [
    { id: 's1', title: 'Things I want to feel this week', content: 'Slow mornings. The smell of coffee before anyone else is awake. That specific kind of quiet that only exists between 6 and 7 am.', icon: '☕', color: 'amber', fav: true,  date: 'Apr 10' },
    { id: 's2', title: 'Side project seeds',               content: 'A habit tracker that feels like journaling. A browser extension for focus. A weather app with poetry mode?',              icon: '💡', color: 'green', fav: false, date: 'Apr 9'  },
    { id: 's3', title: 'JS things to practice',            content: 'localStorage · fetch API · DOM events · ES6 destructuring · async/await · array methods',                                  icon: '⚡', color: 'blue',  fav: false, date: 'Apr 8'  },
    { id: 's4', title: 'Softness as a superpower',         content: 'It takes more strength to stay gentle than to be hard. Reminder for days when the world feels too sharp.',                  icon: '🌿', color: 'red',   fav: false, date: 'Apr 7'  },
    { id: 's5', title: 'Weekend grocery run',              content: 'Sourdough · butter · oat milk · pasta · cherry tomatoes · parmesan · dark chocolate · chamomile tea',                      icon: '📝', color: '',      fav: false, date: 'Apr 6'  },
    { id: 's6', title: '"Stay close to anything that makes you glad you\'re alive." — Hafez', content: '', icon: '📖', color: '', fav: true, date: 'Apr 5' },
  ];

  function loadNotes() {
    const saved = localStorage.getItem('ember-notes');
    return saved ? JSON.parse(saved) : SEEDS;
  }

  function saveNotes(notes) {
    localStorage.setItem('ember-notes', JSON.stringify(notes));
  }

  let notes = loadNotes();

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function createCard(note) {
    const card = document.createElement('div');
    card.className = 'note' + (note.color ? ' ' + note.color : '');
    card.dataset.id = note.id;

    card.innerHTML = `
      <span class="note-tag">${note.icon} Note</span>
      <h3>${escHtml(note.title)}</h3>
      ${note.content ? `<p>${escHtml(note.content)}</p>` : ''}
      <div class="note-footer">
        <span class="note-date">${note.date}</span>
        <div class="note-actions">
          <div class="note-btn btn-fav" title="Favorite" style="${note.fav ? 'color:#d4873a' : ''}">${note.fav ? '♥' : '♡'}</div>
          <div class="note-btn btn-del" title="Delete">✕</div>
        </div>
      </div>
    `;

    card.querySelector('.btn-fav').addEventListener('click', () => toggleFav(note.id));
    card.querySelector('.btn-del').addEventListener('click', () => deleteNote(note.id));
    return card;
  }

  function render() {
    const gridAll  = document.getElementById('grid-all');
    const gridFav  = document.getElementById('grid-fav');
    const emptyAll = document.getElementById('empty-all');
    const emptyFav = document.getElementById('empty-fav');

    document.getElementById('all-label').textContent = `All Notes · ${notes.length}`;

    const favNotes = notes.filter(n => n.fav);
    document.getElementById('fav-label').textContent = `Favorites · ${favNotes.length}`;

    gridAll.innerHTML = '';
    gridFav.innerHTML = '';

    if (notes.length === 0) {
      emptyAll.style.display = 'block'; gridAll.style.display = 'none';
    } else {
      emptyAll.style.display = 'none'; gridAll.style.display = 'grid';
      notes.forEach(n => gridAll.appendChild(createCard(n)));
    }

    if (favNotes.length === 0) {
      emptyFav.style.display = 'block'; gridFav.style.display = 'none';
    } else {
      emptyFav.style.display = 'none'; gridFav.style.display = 'grid';
      favNotes.forEach(n => gridFav.appendChild(createCard(n)));
    }
  }

  function toggleFav(id) {
    notes = notes.map(n => n.id === id ? { ...n, fav: !n.fav } : n);
    saveNotes(notes); render();
  }

  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    saveNotes(notes); render();
  }

  document.getElementById('btn-save').addEventListener('click', () => {
    const titleEl   = document.getElementById('input-title');
    const contentEl = document.getElementById('input-content');
    const title     = titleEl.value.trim();

    if (!title) {
      titleEl.style.borderColor = '#e8998a';
      titleEl.focus();
      setTimeout(() => titleEl.style.borderColor = '', 1200);
      return;
    }

    const icon  = document.querySelector('input[name="icon"]:checked').nextElementSibling.textContent;
    const clId  = document.querySelector('input[name="color"]:checked').id;
    const color = COLOR_MAP[clId];
    const date  = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    notes.unshift({ id: 'n' + Date.now(), title, content: contentEl.value.trim(), icon, color, fav: false, date });
    saveNotes(notes);
    render();

    titleEl.value   = '';
    contentEl.value = '';
    document.getElementById('ic1').checked = true;
    document.getElementById('cl0').checked = true;

    document.getElementById('tab-all').checked = true;
  });

  render();
</script>

</body>
</html>
